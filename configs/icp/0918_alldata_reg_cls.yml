verbose: False
save_ckpt: True

loaders:
  batch_size: 8
  # cls_thresholds: [7, 12, 16]
  # cls_thresholds: [7, 12, 16, 20, 25, 30, 35]
  # cls_thresholds: [5, 10, 20]
  # cls_thresholds: [5, 10, 15, 20]
  # cls_thresholds: [10, 15, 20]
  cls_thresholds: [15]
  # cls_thresholds: [5, 10, 15, 20]
  fold: 0
  fold_num: 5
  fold_split: True
  max_value: 40
  min_value: 0
  num_threads: 8
  offset: 0
  scaler: 10
  serial_batches: False
  test:
    WL_WW: [40, 90]
    img_file_path: /home/yizhenyu/data/ICP/data/huashan/alldata_paths_0804.lst
    text_file_path: /home/yizhenyu/data/ICP/data/huashan/alldata_descriptions_0804.lst
    label_file_path: /home/yizhenyu/data/ICP/data/huashan/alldata_abnormality_0804.lst
    # img_file_path: ../../data/shuqian_all_new_filtered/test_imgs.lst
    # text_file_path: ../../data/shuqian_all_new_filtered/test_descriptions.lst
    # img_file_path: '../../data/multi_center_filtered/all_imgs_registrated.lst'
    # text_file_path: '../../data/multi_center_filtered/all_description.lst'
  train:
    WL_WW: [40, 90]
    img_file_path: /home/yizhenyu/data/ICP/data/huashan/alldata_paths_0804.lst
    text_file_path: /home/yizhenyu/data/ICP/data/huashan/alldata_descriptions_0804.lst
    label_file_path: /home/yizhenyu/data/ICP/data/huashan/alldata_abnormality_0804.lst
    # img_file_path: ../../data/shuqian_all_new_filtered/train_imgs.lst
    # text_file_path: ../../data/shuqian_all_new_filtered/train_descriptions.lst
    # img_file_path: '../../data/multi_center_filtered/all_imgs_registrated.lst'
    # text_file_path: '../../data/multi_center_filtered/all_description.lst'
    transformer:
      raw:
        AdditiveGaussianNoise:
          enabled: True
          execution_probability: 0.2
          scale: (0.0, 1.0)
        AdditivePoissonNoise:
          enabled: True
          execution_probability: 0.2
        ElasticDeformation:
          alpha: 800
          enabled: True
          execution_probability: 0.15
          sigma: 30
          spline_order: 3
        GaussianBlur3D:
          enabled: True
          execution_probability: 0.3
          sigma: [0.5, 1.5]
        RandomFlip:
          axes: [0]
          enabled: True
        RandomRotate:
          angle_spectrum: 45
          axes: [[2, 1]]
          enabled: True
          mode: reflect
loss:
  consis_temparature: 0.07
  lambda_RPS: 0.0
  lambda_bmc: 0.0
  lambda_categorical_ordinal_focal_loss: 0.0
  lambda_clip: 0.0
  lambda_cls: 2.0
  lambda_consis: 0.0
  lambda_regress: 1.0 #1.0
  lambda_ranking: 0.0
  lambda_multi_cls: 1.0
  using_LDS: False


model:
  add_cls_head: False
  add_reg_head: False 
  add_retrieval_reg_head: False
  ct_mil: False 
  using_xpooling: False
  using_attnmil: True
  add_multi_cls: True

  embed_dim: 1024
  num_mha_heads: 1
  transformer_dropout: 0.0

  freeze_backbone: True
  freeze_text_backbone: True
  prompt_length: 12

  use_lora: False
  lora_alpha: 8
  lora_rank: 4
  
  use_vpt: True
  vision_ctx: 3

optimizer:
  beta1: 0.9
  clip_lr: 1e-06
  # lr: 0.0002
  other_lr: 4e-05
  weight_decay: 0.1 #1e-3 #0.02 #1e-3

scheduler:
  accumulate_gradient_count: 1
  cls_weight: 1
  epoch_count: 1
  lr_decay_iters: 50
  lr_policy: linear
  n_epochs: 100
  n_epochs_decay: 100

trainer:
  display_freq: 10
  print_freq: 10
  save_by_iter: False
  save_latest_freq: 10
  update_html_freq: 1000

  save_epoch_freq: 30
  # save_model_freq: 10
